name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package build artifacts
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip ../../../../../pwbox-windows-x64.zip *
        shell: bash

      - name: Get version from pubspec
        id: version
        run: |
          $ver = (Get-Content pubspec.yaml | Select-String '^version:' | ForEach-Object { $_.Line -replace 'version: ', '' -replace '\+.*', '' } | Select-Object -First 1).Trim()
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PwBox ${{ github.ref_name }}"
          body: |
            PwBox Password Manager ${{ steps.version.outputs.VERSION }}
            
            ## Windows 下载
            
            - `pwbox-windows-x64.zip` — Windows 64 位版本（解压后直接运行 pwbox.exe）
          files: build/pwbox-windows-x64.zip
          draft: false
          prerelease: false
