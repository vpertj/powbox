name: pwbox
description: "一个安全的密码管理器应用程序"
# 以下行防止软件包意外发布到
# pub.dev 使用 `flutter pub publish`。这对于私有软件包是首选。
publish_to: "none" # 如果您希望发布到 pub.dev，请删除此行

# 以下定义了应用程序的版本和构建号。
# 版本号是用点分隔的三个数字，如 1.2.43
# 后面可以跟一个可选的构建号，用+分隔。
# 版本号和构建号都可以在 flutter 构建时通过指定 --build-name 和 --build-number 来覆盖。
# 在 Android 中，build-name 用作 versionName，而 build-number 用作 versionCode。
# 有关 Android 版本控制的更多信息，请参阅 https://developer.android.com/studio/publish/versioning
# 在 iOS 中，build-name 用作 CFBundleShortVersionString，而 build-number 用作 CFBundleVersion。
# 有关 iOS 版本控制的更多信息，请参阅
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# 在 Windows 中，build-name 用作产品和文件版本的主要、次要和补丁部分，
# 而 build-number 用作构建后缀。
version: 1.0.0+1

environment:
  sdk: ^3.8.1

# 依赖项指定了您的软件包工作所需的其他软件包。
# 要自动将您的软件包依赖项升级到最新版本，
# 请考虑运行 `flutter pub upgrade --major-versions`。或者，
# 可以通过手动更改下面的版本号来更新依赖项到
# pub.dev 上的最新版本。要查看哪些依赖项有更新的版本可用，
# 请运行 `flutter pub outdated`。
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # 以下将 Cupertino Icons 字体添加到您的应用程序中。
  # 与 CupertinoIcons 类一起使用以获得 iOS 风格的图标。
  cupertino_icons: ^1.0.2
  otp: ^3.1.2
  provider: ^6.1.2
  http: ^1.2.1
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  no_screenshot: ^0.3.1
  cryptography: ^2.5.0
  file_picker: ^10.2.0
  window_manager: ^0.5.1
  shared_preferences: ^2.5.3
  split_view: ^3.2.1
  uuid: ^4.5.1
  mime: ^2.0.0
  base32: ^2.1.0
  crypto: ^3.0.3
  qr_flutter: ^4.0.0
  timezone: ^0.10.1
  sqflite: ^2.3.3
  path: ^1.9.0
  sqflite_common_ffi: ^2.3.3
  flutter_fancy_tree_view: ^1.3.0
  fluentui_system_icons: ^1.1.231
  argon2: ^1.0.1
  hashlib: ^2.2.0
  package_info_plus: ^8.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  # 以下的 "flutter_lints" 软件包包含了一组推荐的 lint 规则，
  # 以鼓励良好的编码实践。该软件包提供的 lint 规则集在位于您的
  # 软件包包根目录的 `analysis_options.yaml` 文件中激活。有关停用特定 lint
  # 规则和激活其他规则的信息，请参阅该文件。
  flutter_lints: ^6.0.0

# 有关此文件通用 Dart 部分的信息，请参阅
# 以下页面: https://dart.dev/tools/pub/pubspec

# 以下部分特定于 Flutter 软件包。
flutter:
  generate: true
  uses-material-design: true

  # 要向您的应用程序添加资源，请添加一个 assets 部分，如下所示：
  assets:
    - assets/

  # 自定义字体
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: fonts/NotoSansSC-Thin.ttf
          weight: 100
        - asset: fonts/NotoSansSC-ExtraLight.ttf
          weight: 200
        - asset: fonts/NotoSansSC-Light.ttf
          weight: 300
        - asset: fonts/NotoSansSC-Regular.ttf
          weight: 400
        - asset: fonts/NotoSansSC-Medium.ttf
          weight: 500
        - asset: fonts/NotoSansSC-SemiBold.ttf
          weight: 600
        - asset: fonts/NotoSansSC-Bold.ttf
          weight: 700
        - asset: fonts/NotoSansSC-ExtraBold.ttf
          weight: 800
        - asset: fonts/NotoSansSC-Black.ttf
          weight: 900

  # 要向您的应用程序添加资源，请添加一个 assets 部分，如下所示：
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # 图像资源可以引用一个或多个分辨率特定的"变体"，请参阅
  # https://flutter.dev/to/resolution-aware-images

  # 有关从软件包依赖项添加资源的详细信息，请参阅
  # https://flutter.dev/to/asset-from-package

  # 要向您的应用程序添加自定义字体，请在此处的 "flutter" 部分添加一个 fonts 部分，
  # 此列表中的每个条目都应该有一个 "family" 键表示字体族名称，
  # 和一个 "fonts" 键表示字体的资产和其他描述符列表。例如：
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # 有关从软件包依赖项获取字体的详细信息，
  # 请参阅 https://flutter.dev/to/font-from-package
